<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flipkart Clone</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">Flipkart</div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search for products...">
    <button onclick="searchProducts()">🔍</button>
  </div>

  <div class="nav-right">
    <button onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</button>
  </div>
</header>

<!-- CATEGORY BAR -->
<section class="categories">
  <button onclick="filterCategory('All')">All</button>
  <button onclick="filterCategory('Electronics')">Electronics</button>
  <button onclick="filterCategory('Fashion')">Fashion</button>
  <button onclick="filterCategory('Home')">Home</button>
</section>

<!-- PRODUCT GRID -->
<section id="productContainer"></section>

<!-- CART SIDEBAR -->
<div id="cartSidebar" class="cart-sidebar">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <h3>Total: ₹<span id="cartTotal">0</span></h3>
  <button onclick="clearCart()">Clear Cart</button>
</div>

<script src="script.js"></script>
</body>
</html>
